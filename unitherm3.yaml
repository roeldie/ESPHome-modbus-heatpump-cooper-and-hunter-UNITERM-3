# SELECT
# ============================================================
select:

  # Word 2 — Mode setting (wijzigbaar als unit UIT staat, zie PDF §5.2)
  # NB: select.modbus_controller ondersteunt alleen holding registers,
  # 'register_type' is GEEN geldige parameter hier.
  - platform: modbus_controller
    modbus_controller_id: unitherm3
    id: mode_select
    name: "Mode Setting"
    address: 2
    value_type: U_WORD
    optionsmap:
      "Heat": 1
      "Hot water": 2
      "Cool + Hot water": 3
      "Heat + Hot water": 4
      "Cool": 5
